name: Release storage client interface 

on:
  push:
    tags:
      - "storage-client-interface/v*"

permissions:
  contents: read
  id-token: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get-version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "using version tag ${TAG#storage-client-interface/v}"
          echo "version=${TAG#storage-client-interface/v}" >> $GITHUB_OUTPUT
  assert-matching-version:
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Ensure version of crate matches release
        id: get-cargo-version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq '.packages[] | select( .name == "storage-client-interface" ) | .version' | tr -d '"')
          if [ "$CARGO_VERSION" != "${{ needs.get-version.outputs.version }}" ]; then
            echo "Version in tag does not match cargo.toml"
            echo "Expected $CARGO_VERSION, Found ${{ needs.get-version.outputs.version }}"
            exit 1
          fi

  dry-run-publish:
    runs-on: ubuntu-latest
    environment: crate-publish
    needs: [get-version, assert-matching-version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: <Dry Run> Package and Publish Cargo to registry
        run: cargo publish -p storage-client-interface --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
  publish-crate:
    runs-on: ubuntu-latest
    environment: crate-publish
    needs: [get-version, assert-matching-version, dry-run-publish]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Package and Publish Cargo to registry
        run: cargo publish -p storage-client-interface
        env:
            CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
